<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Tracker Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --surface3: #30363d;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --accent2: #3fb950;
  --b1: #ff4d4d;
  --b1-bg: rgba(255,77,77,0.12);
  --b2: #f5a623;
  --b2-bg: rgba(245,166,35,0.12);
  --b3: #f9d71c;
  --b3-bg: rgba(249,215,28,0.12);
  --b4: #58a6ff;
  --b4-bg: rgba(88,166,255,0.12);
  --day-bg: #1c2a1c;
  --day-text: #56d364;
  --day-border: #238636;
  --closed-text: #8b949e;
  --open-text: #58a6ff;
  --booked-text: #3fb950;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  min-height: 100vh;
}
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title {
  font-family: 'Space Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
}
.header-title span { color: var(--accent); }
.header-sub {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
  font-family: 'Space Mono', monospace;
}
.stats-bar {
  display: flex;
  gap: 8px;
  align-items: center;
}
.stat-pill {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  color: var(--text-muted);
}
.stat-pill strong { color: var(--text); }
.controls {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}
.control-group {
  display: flex;
  align-items: center;
  gap: 8px;
}
.control-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
  white-space: nowrap;
}
select, input[type="date"] {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  cursor: pointer;
  transition: border-color 0.15s;
}
select:hover, input[type="date"]:hover { border-color: var(--accent); }
select:focus, input[type="date"]:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(88,166,255,0.15); }
select option { background: var(--surface2); }
.btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { background: var(--surface3); border-color: var(--accent); color: var(--accent); }
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #0d1117;
  font-weight: 600;
}
.btn-primary:hover { background: #79c0ff; border-color: #79c0ff; color: #0d1117; }
.result-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.result-count {
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'Space Mono', monospace;
}
.result-count strong { color: var(--accent); }
.pagination {
  display: flex;
  align-items: center;
  gap: 6px;
}
.page-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
  min-width: 28px;
  text-align: center;
}
.page-btn:hover { border-color: var(--accent); color: var(--accent); }
.page-btn.active { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 700; }
.page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.table-wrap {
  overflow-x: auto;
  overflow-y: auto;
  max-height: calc(100vh - 200px);
}
table {
  border-collapse: collapse;
  min-width: 100%;
  width: max-content;
}
thead th {
  background: var(--surface);
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  padding: 10px 12px;
  border-bottom: 2px solid var(--border);
  border-right: 1px solid var(--border);
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 10;
  cursor: pointer;
  user-select: none;
  transition: color 0.15s;
  text-align: left;
}
thead th:hover { color: var(--accent); }
thead th.date-col {
  background: #0d1f2d;
  color: #4d9de0;
  border-bottom-color: #1e4d7a;
  text-align: center;
  min-width: 160px;
}
thead th.date-col.today {
  background: #0d2a1a;
  color: var(--accent2);
  border-bottom-color: var(--day-border);
}
thead th:first-child,
thead th:nth-child(2) {
  position: sticky;
  z-index: 20;
}
thead th:first-child { left: 0; }
thead th:nth-child(2) { left: 110px; }
tbody tr {
  border-bottom: 1px solid rgba(48,54,61,0.5);
  transition: background 0.1s;
}
tbody tr:hover { background: rgba(88,166,255,0.04); }
tbody td {
  padding: 8px 12px;
  border-right: 1px solid rgba(48,54,61,0.3);
  white-space: nowrap;
  vertical-align: middle;
}
tbody td:first-child,
tbody td:nth-child(2) {
  position: sticky;
  background: var(--bg);
  z-index: 5;
}
tbody td:first-child { left: 0; }
tbody td:nth-child(2) { left: 110px; }
tbody tr:hover td:first-child,
tbody tr:hover td:nth-child(2) { background: #121920; }
.agent-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.lead-id {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  font-weight: 700;
}
.received-date, .move-date {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
}
.move-date { color: var(--text); }
.bucket-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.3px;
}
.b1 { background: var(--b1-bg); color: var(--b1); border: 1px solid rgba(255,77,77,0.3); }
.b2 { background: var(--b2-bg); color: var(--b2); border: 1px solid rgba(245,166,35,0.3); }
.b3 { background: var(--b3-bg); color: var(--b3); border: 1px solid rgba(249,215,28,0.3); }
.b4 { background: var(--b4-bg); color: var(--b4); border: 1px solid rgba(88,166,255,0.3); }
.status-text {
  font-size: 11px;
  max-width: 200px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.status-open { color: var(--open-text); }
.status-closed { color: var(--closed-text); }
.status-booked { color: var(--booked-text); font-weight: 600; }
.status-new { color: #e3b341; }

/* Day cell */
.day-cell {
  text-align: left;
  min-width: 160px;
  padding: 6px 8px !important;
  vertical-align: top !important;
  white-space: normal !important;
}
.today-col { background: rgba(63,185,80,0.03); }

/* Move day indicator */
.move-day-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #3fb950;
  box-shadow: 0 0 5px rgba(63,185,80,0.6);
  margin-right: 5px;
  vertical-align: middle;
  flex-shrink: 0;
}

/* Inline action block — replaces the pill + popup */
.inline-actions {
  display: flex;
  flex-direction: column;
  gap: 3px;
  width: 100%;
}

.action-line {
  display: flex;
  align-items: flex-start;
  gap: 5px;
  font-size: 10.5px;
  line-height: 1.4;
  color: var(--text);
  padding: 2px 0;
}

.action-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 16px;
  height: 16px;
  border-radius: 50%;
  font-size: 9px;
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
}

/* Color variants by action type */
.action-line.type-call  { color: #79c0ff; }
.action-line.type-sms   { color: #e3b341; }
.action-line.type-email { color: #56d364; }
.action-line.type-multi { color: #c9d1d9; }

.action-num.type-call  { background: rgba(97,175,254,0.2);  color: #79c0ff; }
.action-num.type-sms   { background: rgba(227,179,65,0.2);  color: #e3b341; }
.action-num.type-email { background: rgba(86,211,100,0.2);  color: #56d364; }
.action-num.type-multi { background: rgba(198,120,221,0.2); color: #c678dd; }

/* Thin top border for each cell that has content */
.day-cell.has-content {
  border-top: 2px solid transparent;
}
.day-cell.has-content.bc-b1 { border-top-color: rgba(255,77,77,0.4); background: rgba(255,77,77,0.03); }
.day-cell.has-content.bc-b2 { border-top-color: rgba(245,166,35,0.4); background: rgba(245,166,35,0.03); }
.day-cell.has-content.bc-b3 { border-top-color: rgba(249,215,28,0.4); background: rgba(249,215,28,0.03); }
.day-cell.has-content.bc-b4 { border-top-color: rgba(88,166,255,0.4); background: rgba(88,166,255,0.03); }
.day-cell.has-content.bc-move { border-top-color: #3fb950; background: rgba(63,185,80,0.05); }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-family: 'Space Mono', monospace;
}
.empty-state .big { font-size: 32px; margin-bottom: 8px; }
.sort-icon { margin-left: 4px; opacity: 0.4; font-size: 10px; }
.sort-icon.active { opacity: 1; color: var(--accent); }

/* Agent colors */
.agent-Alexander { background: rgba(136,46,185,0.2); color: #c678dd; }
.agent-Anthony { background: rgba(97,175,254,0.2); color: #61afef; }
.agent-Arthur { background: rgba(86,182,194,0.2); color: #56b6c2; }
.agent-Daniel { background: rgba(229,192,123,0.2); color: #e5c07b; }
.agent-Dustin { background: rgba(190,80,70,0.2); color: #e06c75; }
.agent-Jessica { background: rgba(255,121,198,0.2); color: #ff79c6; }
.agent-Myles { background: rgba(80,200,120,0.2); color: #50fa7b; }
.agent-Noah { background: rgba(241,250,140,0.2); color: #f1fa8c; }
.agent-Simon { background: rgba(139,233,253,0.2); color: #8be9fd; }
.agent-Solomon { background: rgba(255,85,85,0.2); color: #ff5555; }
.agent-Thomas { background: rgba(255,183,77,0.2); color: #ffb74d; }
.agent-William { background: rgba(102,217,239,0.2); color: #66d9ef; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Lead <span>Tracker</span> Dashboard</div>
    <div class="header-sub" id="headerSub">Apr 22 – Apr 22, 2026 &nbsp;|&nbsp; Move Timeline View</div>
  </div>
  <div class="stats-bar">
    <div class="stat-pill" id="statTotal"><strong>–</strong> Total</div>
    <div class="stat-pill" id="statOpen"><strong>–</strong> Open</div>
    <div class="stat-pill" id="statBooked"><strong>–</strong> Booked</div>
    <div class="stat-pill" id="statClosed"><strong>–</strong> Closed</div>
  </div>
</div>

<div class="controls">
  <div class="control-group">
    <span class="control-label">Agent</span>
    <select id="agentFilter"><option value="">All Agents</option></select>
  </div>
  <div class="control-group">
    <span class="control-label">Bucket</span>
    <select id="bucketFilter">
      <option value="">All Buckets</option>
      <option value="Bucket 1">Bucket 1</option>
      <option value="Bucket 2">Bucket 2</option>
      <option value="Bucket 3">Bucket 3</option>
      <option value="Bucket 4">Bucket 4</option>
    </select>
  </div>
  <div class="control-group">
    <span class="control-label">Timeline From</span>
    <input type="date" id="moveDateFrom" value="2026-04-22">
  </div>
  <div class="control-group">
    <span class="control-label">To</span>
    <input type="date" id="moveDateTo" value="2026-04-22">
  </div>
  <button class="btn btn-primary" onclick="applyFilters()">Apply</button>
  <button class="btn" onclick="resetFilters()">Reset</button>
  <button class="btn" onclick="loadData()">🔄 Refresh Data</button>
  <div style="margin-left:auto" class="control-group">
    <span class="control-label">Per Page</span>
    <select id="perPage">
      <option value="25">25</option>
      <option value="50" selected>50</option>
      <option value="100">100</option>
      <option value="200">200</option>
    </select>
  </div>
</div>

<div class="result-bar">
  <div class="result-count" id="resultCount">Showing <strong>0</strong> of <strong>0</strong> leads</div>
  <div class="pagination" id="pagination"></div>
</div>

<div class="table-wrap">
  <table id="mainTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
// ─────────────────────────────────────────────
// FOLLOW-UP STRATEGY DATA
// ─────────────────────────────────────────────
const CLOSE_RANGE_ACTIONS = {
  14: { steps:['1st call within first half of shift','SMS Template 25 immediately after 1st call','Value Email Template 21'], type:'multi' },
  13: { steps:['1st call within first half of shift','SMS Template 26 immediately after 1st call','Value Email Template 22'], type:'multi' },
  12: { steps:['1st call within first half of shift','SMS Template 26 immediately after 1st call','Value Email Template 23'], type:'multi' },
  11: { steps:['1st call within first half of shift','SMS Template 27 immediately after 1st call','Value Email Template 24'], type:'multi' },
  10: { steps:['1st call within first half of shift','SMS Template 28 immediately after 1st call','Value Email Template 25'], type:'multi' },
   9: { steps:['1st call within first half of shift','SMS Template 29 immediately after 1st call','Value Email Template 26'], type:'multi' },
   8: { steps:['1st call within first half of shift','SMS Template 30 immediately after 1st call','Value Email Template 27'], type:'multi' },
   7: { steps:['1st call within first half of shift','SMS Template 31 immediately after 1st call','Value Email Template 28'], type:'multi' },
   6: { steps:['1st call within first half of shift','SMS Template 32 immediately after 1st call','Value Email Template 29'], type:'multi' },
   5: { steps:['1st call within first half of shift','SMS Template 33 immediately after 1st call','Value Email Template 30'], type:'multi' },
   4: { steps:['1st call within first half of shift','SMS Template 34 immediately after 1st call','Value Email Template 31'], type:'multi' },
   3: { steps:['1st call within first half of shift','SMS Template 35 immediately after 1st call','Value Email Template 32'], type:'multi' },
   2: { steps:['1st call within first half of shift','SMS Template 36 immediately after 1st call','Value Email Template 33'], type:'multi' },
   1: { steps:['1st call within first half of shift','SMS Template 37 immediately after 1st call','Value Email Template 34'], type:'multi' },
   0: { steps:['1st call within first half of shift','SMS Template 38 immediately after 1st call','Value Email Template 34'], type:'multi' },
};

const DAY1_ACTION = {
  steps:[
    '1st call within 30 Seconds',
    'SMS Template 1 immediately after 1st call',
    '2nd call within 5 Mins',
    'Email with Estimate (Not connected template)',
    '3rd call within 15 Mins',
    '4th call within 1 hour',
    'Final call before EOD'
  ], type:'multi'
};
const DAY2_ACTION = {
  steps:[
    '1st call within first half of shift',
    'SMS Template 2 immediately after 1st call',
    'Value Email Template 1',
    '2nd call 2nd half of the shift'
  ], type:'multi'
};

const STRATEGY = {
  'Bucket 1': {
    1: DAY1_ACTION,
    2: DAY2_ACTION,
    3: { steps:['1st call within first half of shift','SMS Template 3 immediately after 1st call','2nd call 2nd half of the shift'], type:'multi' },
    4: { steps:['1st call within first half of shift','SMS Template 4 immediately after 1st call','Email Template 2'], type:'multi' },
    5: { steps:['1st call within first half of shift','SMS Template 5 immediately after 1st call'], type:'multi' },
  },
  'Bucket 2': {
    1:  DAY1_ACTION,
    2:  DAY2_ACTION,
    3:  { steps:['1st call within first half of shift','SMS Template 6 immediately after 1st call'], type:'multi' },
    5:  { steps:['1st call within first half of shift','Value Email Template 3'], type:'multi' },
    6:  { steps:['Send SMS Template 7'], type:'sms' },
    7:  { steps:['1st call within first half of shift'], type:'call' },
    9:  { steps:['Send Email Template 4'], type:'email' },
    10: { steps:['Send SMS Template 8'], type:'sms' },
    11: { steps:['1st call within first half of shift'], type:'call' },
    13: { steps:['Send SMS Template 9'], type:'sms' },
    14: { steps:['Send Email Template 5'], type:'email' },
  },
  'Bucket 3': {
    1:  DAY1_ACTION,
    2:  DAY2_ACTION,
    3:  { steps:['1st call within first half of shift','SMS Template 10 immediately after 1st call'], type:'multi' },
    5:  { steps:['Send Email Template 6'], type:'email' },
    7:  { steps:['1st call within first half of shift'], type:'call' },
    10: { steps:['Send SMS Template 11'], type:'sms' },
    14: { steps:['Send Email Template 7'], type:'email' },
    18: { steps:['1st call within first half of shift'], type:'call' },
    21: { steps:['Send SMS Template 12'], type:'sms' },
    25: { steps:['Send Email Template 8'], type:'email' },
    30: { steps:['1st call within first half of shift'], type:'call' },
    40: { steps:['Send SMS Template 13'], type:'sms' },
    45: { steps:['Send Email Template 9'], type:'email' },
  },
  'Bucket 4': {
    1:   DAY1_ACTION,
    2:   DAY2_ACTION,
    3:   { steps:['1st call within first half of shift'], type:'call' },
    5:   { steps:['Send Email Template 10'], type:'email' },
    10:  { steps:['Send SMS Template 14'], type:'sms' },
    14:  { steps:['Send Email Template 11'], type:'email' },
    21:  { steps:['1st call within first half of shift'], type:'call' },
    30:  { steps:['Send Email Template 12'], type:'email' },
    45:  { steps:['Send SMS Template 15'], type:'sms' },
    60:  { steps:['Send Template 16'], type:'email' },
    75:  { steps:['1st call within first half of shift','SMS Template 17 immediately after 1st call','Value Email Template 13'], type:'multi' },
    90:  { steps:['1st call within first half of shift','SMS Template 18 immediately after 1st call','Value Email Template 14'], type:'multi' },
    105: { steps:['1st call within first half of shift','SMS Template 19 immediately after 1st call','Value Email Template 15'], type:'multi' },
    120: { steps:['1st call within first half of shift','SMS Template 20 immediately after 1st call','Value Email Template 16'], type:'multi' },
    135: { steps:['1st call within first half of shift','SMS Template 21 immediately after 1st call','Value Email Template 17'], type:'multi' },
    150: { steps:['1st call within first half of shift','SMS Template 22 immediately after 1st call','Value Email Template 18'], type:'multi' },
    165: { steps:['1st call within first half of shift','SMS Template 22 immediately after 1st call','Value Email Template 19'], type:'multi' },
    180: { steps:['1st call within first half of shift','SMS Template 24 immediately after 1st call','Value Email Template 20'], type:'multi' },
  },
};

function getStrategyAction(bucket, dayNum, daysToMove) {
  const bucketMap = STRATEGY[bucket];
  if (!bucketMap) return null;
  if ((bucket === 'Bucket 3' || bucket === 'Bucket 4') && daysToMove <= 14 && daysToMove >= 0) {
    return CLOSE_RANGE_ACTIONS[daysToMove] || null;
  }
  return bucketMap[dayNum] || null;
}

// ─────────────────────────────────────────────
// DATA LOADING
// ─────────────────────────────────────────────
let RAW = [];

async function loadData() {
  showLoadingState();
  try {
    const response = await fetch('/api/data');
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const text = await response.text();
    RAW = parseCSV(text);
    if (RAW.length === 0) {
      showError('No active leads found. All rows may be Booked/Closed, or headers may not match.');
      return;
    }
    buildHead();
    initAgents();
    applyFilters();
    updateLastRefreshed();
  } catch (err) {
    showError('Error loading data: ' + err.message);
    console.error('Load error:', err);
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 1) return [];
  const headerMap = {
    'id':'id','lead id':'id','salesjet id':'id','lid':'id',
    'cust name':'custName','customer name':'custName','name':'custName',
    'agent':'agent','sales agent':'agent','user':'agent',
    'received':'received','received time ist':'received','date received':'received',
    'move':'move','move date':'move',
    'bucket':'bucket','bucket type':'bucket','category':'bucket',
    'daysleft':'daysLeft','days left':'daysLeft','timeline':'daysLeft',
    'status':'status','lead status':'status'
  };
  const rawHeaders = lines[0].split(',').map(h => h.trim().replace(/"/g,'').toLowerCase());
  const headers = rawHeaders.map(h => headerMap[h] || h);
  return lines.slice(1).map(line => {
    const values = [];
    let cur = '', inQ = false;
    for (let char of line) {
      if (char === '"') inQ = !inQ;
      else if (char === ',' && !inQ) { values.push(cur.trim()); cur = ''; }
      else cur += char;
    }
    values.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => {
      let val = (values[i] || '').replace(/^"|"$/g,'').trim();
      if (h === 'received' || h === 'move') {
        const datePart = val.split(' ')[0];
        if (/^\d{2}-\d{2}-\d{4}$/.test(datePart)) {
          const [d, m, y] = datePart.split('-');
          val = `${y}-${m}-${d}`;
        }
      }
      if (h === 'bucket' && val.includes('-')) val = val.replace('-', ' ');
      obj[h] = val;
    });
    return obj;
  }).filter(r => {
    if (!r.id || r.id === '' || !r.agent) return false;
    const s = (r.status || '').toLowerCase();
    if (s.includes('booked') || s.includes('closed')) return false;
    return true;
  });
}

function showLoadingState() {
  document.getElementById('tableBody').innerHTML = `
    <tr><td colspan="20" style="text-align:center;padding:80px;color:var(--text-muted);font-family:'Space Mono',monospace;background:var(--surface2);">
      <div style="font-size:24px;margin-bottom:10px;">⏳</div>Syncing with Sheet...
    </td></tr>`;
}
function showError(msg) {
  document.getElementById('tableBody').innerHTML = `
    <tr><td colspan="20" style="text-align:center;padding:80px;color:#ff4d4d;font-family:'Space Mono',monospace;background:var(--surface2);">
      <div style="font-size:24px;margin-bottom:10px;">⚠️</div>${msg}
    </td></tr>`;
}
function updateLastRefreshed() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  let el = document.getElementById('lastRefreshed');
  if (!el) {
    const parent = document.getElementById('headerSub');
    el = document.createElement('span');
    el.id = 'lastRefreshed';
    el.style.cssText = 'margin-left:16px;padding-left:16px;border-left:1px solid var(--border);opacity:0.7';
    parent.appendChild(el);
  }
  el.textContent = `Sync: ${timeStr}`;
}

// ─────────────────────────────────────────────
// DATE UTILS
// ─────────────────────────────────────────────
const TODAY = new Date().toISOString().slice(0, 10);

function generateDateRange(fromDate, toDate) {
  const dates = [];
  let current = new Date(fromDate);
  const end = new Date(toDate);
  while (current <= end) {
    dates.push(current.toISOString().slice(0, 10));
    current.setDate(current.getDate() + 1);
  }
  return dates;
}

let DATE_COLS = generateDateRange('2026-04-22', '2026-04-22');
let filtered = [];
let currentPage = 1;

function formatDateShort(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${day}-${m}-${y.slice(2)}`;
}
function dateDiffDays(a, b) {
  return Math.round((new Date(a) - new Date(b)) / 86400000);
}
function getBucketClass(bucket) {
  if (!bucket) return '';
  if (bucket.includes('1')) return 'b1';
  if (bucket.includes('2')) return 'b2';
  if (bucket.includes('3')) return 'b3';
  if (bucket.includes('4')) return 'b4';
  return '';
}
function getStatusClass(status) {
  if (!status) return '';
  const s = status.toLowerCase();
  if (s.includes('open')) return 'status-open';
  if (s.includes('booked')) return 'status-booked';
  if (s.includes('closed')) return 'status-closed';
  if (s === 'new') return 'status-new';
  if (s.includes('follow up')) return 'status-open';
  return '';
}
function formatMonthDay(d) {
  if (!d) return '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const [y, m, day] = d.split('-');
  return `${months[parseInt(m,10)-1]} ${parseInt(day,10)}`;
}

// ─────────────────────────────────────────────
// TABLE BUILD
// ─────────────────────────────────────────────
function buildHead() {
  const head = document.getElementById('tableHead');
  const cols = [
    {key:'agent',    label:'Agent'},
    {key:'id',       label:'Salesjet ID'},
    {key:'custName', label:'Cust Name'},
    {key:'received', label:'Received Date'},
    {key:'move',     label:'Move Date'},
    {key:'bucket',   label:'Bucket Type'},
    {key:'status',   label:'Status'},
  ];
  let html = '<tr>';
  cols.forEach(c => {
    html += `<th onclick="sortBy('${c.key}')">${c.label}<span class="sort-icon">↕</span></th>`;
  });
  DATE_COLS.forEach(d => {
    const [y, m, day] = d.split('-');
    const isToday = d === TODAY;
    html += `<th class="date-col${isToday?' today':''}">${day}-${m}<br><small style="font-size:9px;opacity:0.7">${y}</small></th>`;
  });
  html += '</tr>';
  head.innerHTML = html;

  const from = DATE_COLS[0], to = DATE_COLS[DATE_COLS.length - 1];
  document.getElementById('headerSub').textContent =
    `${formatMonthDay(from)} – ${formatMonthDay(to)}, ${from ? from.slice(0,4) : ''} \u00a0|\u00a0 Move Timeline View`;
}

let sortKey = 'received', sortDir = -1;
function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = -1; }
  renderTable();
}

function applyFilters() {
  const agent  = document.getElementById('agentFilter').value;
  const bucket = document.getElementById('bucketFilter').value;
  const fromDate = document.getElementById('moveDateFrom').value;
  const toDate   = document.getElementById('moveDateTo').value;

  if (fromDate && toDate && fromDate <= toDate) DATE_COLS = generateDateRange(fromDate, toDate);
  else if (fromDate && !toDate) DATE_COLS = generateDateRange(fromDate, fromDate);
  else if (!fromDate && toDate) DATE_COLS = generateDateRange(toDate, toDate);

  buildHead();

  filtered = RAW.filter(r => {
    if (agent  && r.agent  !== agent)  return false;
    if (bucket && r.bucket !== bucket) return false;
    return true;
  });
  currentPage = 1;
  updateStats();
  renderTable();
}

function resetFilters() {
  document.getElementById('agentFilter').value  = '';
  document.getElementById('bucketFilter').value = '';
  document.getElementById('moveDateFrom').value = TODAY;
  document.getElementById('moveDateTo').value   = TODAY;
  applyFilters();
}

function updateStats() {
  const total  = filtered.length;
  const open   = filtered.filter(r => r.status.toLowerCase().includes('open') || r.status.toLowerCase().includes('follow up')).length;
  const booked = filtered.filter(r => r.status.toLowerCase().includes('booked')).length;
  const closed = filtered.filter(r => r.status.toLowerCase().includes('closed')).length;
  document.getElementById('statTotal').innerHTML  = `<strong>${total}</strong> Total`;
  document.getElementById('statOpen').innerHTML   = `<strong>${open}</strong> Open`;
  document.getElementById('statBooked').innerHTML = `<strong>${booked}</strong> Booked`;
  document.getElementById('statClosed').innerHTML = `<strong>${closed}</strong> Closed`;
}

function renderTable() {
  const perPage = parseInt(document.getElementById('perPage').value);
  const sorted = [...filtered].sort((a, b) => {
    let av = a[sortKey] || '', bv = b[sortKey] || '';
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });

  const total = sorted.length;
  const pages = Math.max(1, Math.ceil(total / perPage));
  if (currentPage > pages) currentPage = pages;

  const start = (currentPage - 1) * perPage;
  const pageData = sorted.slice(start, start + perPage);

  document.getElementById('resultCount').innerHTML =
    `Showing <strong>${start+1}–${Math.min(start+perPage, total)}</strong> of <strong>${total}</strong> leads`;
  renderPagination(pages);

  const body = document.getElementById('tableBody');
  if (pageData.length === 0) {
    body.innerHTML = `<tr><td colspan="${7+DATE_COLS.length}" class="empty-state">
      <div class="big">🔍</div><div>No leads match your filters</div></td></tr>`;
    return;
  }

  let html = '';
  pageData.forEach(r => {
    const bc = getBucketClass(r.bucket);
    const sc = getStatusClass(r.status);
    const agentClass = 'agent-' + (r.agent || 'Unknown');

    html += `<tr>
      <td><span class="agent-badge ${agentClass}">${r.agent||'–'}</span></td>
      <td style="font-family:'Space Mono',monospace;font-size:11px;">${r.id||'–'}</td>
      <td style="font-size:12px;">${r.custName||'–'}</td>
      <td>${r.received ? formatDateShort(r.received) : '–'}</td>
      <td><span class="move-date">${formatDateShort(r.move)}</span></td>
      <td>${r.bucket ? `<span class="bucket-badge ${bc}">${r.bucket}</span>` : '–'}</td>
      <td><span class="status-text ${sc}" title="${r.status}">${r.status || '–'}</span></td>`;

    DATE_COLS.forEach(d => {
      const isToday = d === TODAY;

      if (r.received && r.move && d >= r.received && d <= r.move) {
        const dayNum     = dateDiffDays(d, r.received) + 1;
        const daysToMove = dateDiffDays(r.move, d);
        const isMoveDay  = d === r.move;

        const action = getStrategyAction(r.bucket, dayNum, daysToMove);
        const colorClass = isMoveDay ? 'bc-move' : `bc-${bc}`;

        let innerHtml = '';
        if (action && action.steps && action.steps.length > 0) {
          // If move day, show small indicator dot
          const moveDot = isMoveDay ? '<span class="move-day-dot" title="Move Day"></span>' : '';
          const stepsHtml = action.steps.map((s, i) =>
            `<div class="action-line type-${action.type}">
              <span class="action-num type-${action.type}">${i+1}</span>
              <span>${s}</span>
            </div>`
          ).join('');
          innerHtml = `<div class="inline-actions">${moveDot ? `<div style="margin-bottom:3px">${moveDot}<span style="font-size:9px;color:#3fb950;font-family:'Space Mono',monospace">MOVE DAY</span></div>` : ''}${stepsHtml}</div>`;
        } else if (isMoveDay) {
          // Move day but no action
          innerHtml = `<div style="font-size:9px;color:#3fb950;font-family:'Space Mono',monospace;"><span class="move-day-dot"></span>MOVE DAY</div>`;
        }

        html += `<td class="day-cell has-content ${colorClass}${isToday?' today-col':''}">${innerHtml}</td>`;
      } else {
        html += `<td class="day-cell${isToday?' today-col':''}"></td>`;
      }
    });

    html += '</tr>';
  });

  body.innerHTML = html;
}

function renderPagination(pages) {
  const pg = document.getElementById('pagination');
  if (pages <= 1) { pg.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>`;
  let start = Math.max(1, currentPage-2);
  let end   = Math.min(pages, start+4);
  if (end - start < 4) start = Math.max(1, end-4);
  if (start > 1) { html += `<button class="page-btn" onclick="goPage(1)">1</button>`; if (start>2) html += `<span style="color:var(--text-muted);font-size:11px">…</span>`; }
  for (let i = start; i <= end; i++) html += `<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  if (end < pages) { if (end<pages-1) html += `<span style="color:var(--text-muted);font-size:11px">…</span>`; html += `<button class="page-btn" onclick="goPage(${pages})">${pages}</button>`; }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=pages?'disabled':''}>›</button>`;
  pg.innerHTML = html;
}

function goPage(p) {
  const perPage = parseInt(document.getElementById('perPage').value);
  const pages = Math.ceil(filtered.length / perPage);
  if (p < 1 || p > pages) return;
  currentPage = p;
  renderTable();
  document.querySelector('.table-wrap').scrollTop = 0;
}

function initAgents() {
  const agents = [...new Set(RAW.map(r => r.agent).filter(Boolean))].sort();
  const sel = document.getElementById('agentFilter');
  sel.innerHTML = '<option value="">All Agents</option>';
  agents.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a; opt.textContent = a;
    sel.appendChild(opt);
  });
}

document.getElementById('perPage').addEventListener('change', () => { currentPage = 1; renderTable(); });
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goPage(currentPage+1);
  if (e.key === 'ArrowLeft')  goPage(currentPage-1);
});

loadData();
setInterval(loadData, 300000);
</script>
